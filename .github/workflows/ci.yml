name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Nexus.Hub.sln

      - name: Build
        run: dotnet build src/Nexus.Hub.sln --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test src/Nexus.Hub.sln
          --no-build
          --configuration Release
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./coverage/
          /p:ThresholdType=line
          /p:Threshold=80
          /p:ExcludeByFile="**/Migrations/**%2c**/Program.cs"
          /p:Exclude="[*]Nexus.Hub.Infrastructure.Data.*%2c[*]Nexus.Hub.Infrastructure.Repositories.*"
