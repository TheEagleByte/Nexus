Spoke:
  Id: "00000000-0000-0000-0000-000000000001"
  Name: "Test Workstation"
  Os: "windows"
  Architecture: "x64"

Hub:
  Url: "http://localhost:5000/hubs/nexus"
  Token: "dev-token-changeme"

Capabilities:
  Jira: true
  Git: true
  Docker: true
  PrMonitoring: false

Jira:
  InstanceUrl: "https://your-instance.atlassian.net"
  Email: "you@example.com"
  Token: "your-jira-api-token"
  ProjectKeys:
    - "PROJ"

Workspace:
  BaseDirectory: "%LOCALAPPDATA%\\Nexus"  # Uses env var expansion; Linux/macOS: ~/.nexus

Approval:
  Mode: "plan_review"
  BatchSize: 5
  MaxConcurrentJobs: 2
  HeartbeatIntervalSeconds: 30

Docker:
  WorkerImage: "nexus-worker:latest"
  WorkerDockerfilePath: "worker/Dockerfile"
  Registry: ""
  ResourceLimits:
    MemoryBytes: 8589934592      # 8GB
    CpuCount: 2
    DiskLimitBytes: 107374182400  # 100GB
  TimeoutSeconds: 14400           # 4 hours
  ContainerUser: "1000:1000"
  NetworkMode: "bridge"
  ReadOnlyRootFs: true
  Credentials:
    Git:
      AuthMethod: "ssh"                # "ssh" or "token"
      SshKeyPath: "~/.ssh/id_ed25519"  # Used when AuthMethod is "ssh"
      Token: ""                        # GitHub PAT or similar; must be non-empty when AuthMethod is "token"
      UserName: "Your Name"
      UserEmail: "you@example.com"
    GhToken: ""                        # GitHub CLI token (for gh pr create, etc.)

GitProvider:
  Type: "github"                       # "github" or "gitlab"
  SyncIntervalSeconds: 300             # Background sync interval (minimum 30)
  BranchTemplate: "nexus/{type}/{key}" # Placeholders: {type}, {key}, {job-id}
  Repositories: []
    # - Name: "my-repo"
    #   RemoteUrl: "git@github.com:org/my-repo.git"
    #   DefaultBranch: "main"
